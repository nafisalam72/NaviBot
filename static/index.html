<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NaviBot - AI Stadium Assistant for FIFA World Cup 2026" />
  <title>NaviBot - Smart Stadiums & Tournament</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --user-msg: #3b82f6;
      --bot-msg: #334155;
      --border-color: #334155;
      --error-color: #ef4444;
      --success-color: #10b981;
      --warning-color: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0;
    }

    header {
      background-color: var(--card-bg);
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }

    .logo-area { display: flex; align-items: center; gap: 0.75rem; }
    .logo-icon { font-size: 1.5rem; }
    
    h1 {
      font-size: 1.25rem; font-weight: 600; letter-spacing: -0.025em;
    }

    .controls { display: flex; gap: 1rem; align-items: center; }

    select {
      background-color: var(--bg-color); color: var(--text-main);
      border: 1px solid var(--border-color); border-radius: 0.375rem;
      padding: 0.5rem; font-size: 0.875rem; cursor: pointer; outline: none;
    }

    select:focus { border-color: var(--accent); }

    main {
      flex: 1; display: flex; flex-direction: column; max-width: 800px;
      margin: 0 auto; width: 100%; position: relative;
    }

    .chat-container {
      flex: 1; overflow-y: auto; padding: 1.5rem; display: flex;
      flex-direction: column; gap: 1rem; scroll-behavior: smooth;
    }

    .message {
      max-width: 85%; padding: 1rem; border-radius: 0.75rem;
      line-height: 1.5; font-size: 0.9375rem; animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      background-color: var(--user-msg); color: white;
      align-self: flex-end; border-bottom-right-radius: 0.25rem;
    }

    .message.bot {
      background-color: var(--bot-msg); color: var(--text-main);
      align-self: flex-start; border-bottom-left-radius: 0.25rem;
    }

    .message p { margin-bottom: 0.5rem; }
    .message p:last-child { margin-bottom: 0; }
    .message ul { margin-left: 1.5rem; margin-bottom: 0.5rem; }
    .message li { margin-bottom: 0.25rem; }

    .meta-data {
      font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;
      display: flex; gap: 0.75rem; align-items: center; border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 0.5rem;
    }

    .badge {
      padding: 0.125rem 0.375rem; border-radius: 9999px; font-weight: 500;
    }

    .badge.crowd-Low { background-color: rgba(16, 185, 129, 0.2); color: var(--success-color); }
    .badge.crowd-Moderate { background-color: rgba(245, 158, 11, 0.2); color: var(--warning-color); }
    .badge.crowd-High { background-color: rgba(239, 68, 68, 0.2); color: var(--error-color); }

    .input-container {
      padding: 1.5rem; background-color: var(--bg-color); border-top: 1px solid var(--border-color);
    }

    .input-area {
      display: flex; gap: 0.75rem; background-color: var(--card-bg);
      padding: 0.5rem; border-radius: 0.75rem; border: 1px solid var(--border-color);
      transition: border-color 0.2s; align-items: flex-end;
    }

    .input-area:focus-within { border-color: var(--accent); }

    textarea {
      flex: 1; background: transparent; border: none; color: var(--text-main);
      font-family: inherit; font-size: 0.9375rem; padding: 0.5rem;
      resize: none; outline: none; min-height: 44px; max-height: 120px;
    }

    textarea::placeholder { color: var(--text-muted); }

    button {
      background-color: var(--accent); color: white; border: none;
      border-radius: 0.5rem; padding: 0.5rem 1rem; font-weight: 500;
      cursor: pointer; transition: background-color 0.2s;
      height: 44px; display: flex; align-items: center; gap: 0.5rem;
    }

    button:hover:not(:disabled) { background-color: var(--accent-hover); }
    
    button:disabled { background-color: var(--border-color); color: var(--text-muted); cursor: not-allowed; }

    .loading-indicator {
      display: none; align-self: flex-start; background-color: var(--bot-msg);
      padding: 1rem; border-radius: 0.75rem; border-bottom-left-radius: 0.25rem;
    }

    .dots { display: flex; gap: 4px; }
    .dot {
      width: 8px; height: 8px; background-color: var(--text-muted);
      border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both;
    }
    
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    @media (max-width: 640px) {
      header { padding: 1rem; flex-direction: column; gap: 1rem; align-items: stretch; }
      .controls { justify-content: space-between; }
      .message { max-width: 95%; }
    }
  </style>
</head>
<body>

  <header role="banner">
    <div class="logo-area">
      <span class="logo-icon" aria-hidden="true">🏟️</span>
      <h1>NaviBot <span style="color: var(--text-muted); font-weight: 400; font-size: 0.875em;">| FIFA 2026 Assistant</span></h1>
    </div>
    <div class="controls">
      <div>
        <label for="stadiumSelect" class="sr-only">Select Stadium</label>
        <select id="stadiumSelect" aria-label="Select Stadium">
          <option value="MetLife Stadium">MetLife Stadium (NY/NJ)</option>
          <option value="Azteca Stadium">Azteca Stadium (Mexico City)</option>
          <option value="Lumen Field">Lumen Field (Seattle)</option>
        </select>
      </div>
      <div>
        <label for="languageSelect" class="sr-only">Select Language</label>
        <select id="languageSelect" aria-label="Select Language">
          <option value="en">English</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="bn">বাংলা</option>
        </select>
      </div>
    </div>
  </header>

  <main role="main">
    <div class="chat-container" id="chatContainer" aria-live="polite">
      <div class="message bot">
        <p>👋 Hello! I am NaviBot, your official FIFA World Cup 2026 assistant.</p>
        <p>I can help you navigate the stadium, find accessible routes, check crowd levels, or locate amenities like food and restrooms.</p>
        <p>How can I assist you today?</p>
      </div>
    </div>
    
    <div class="loading-indicator" id="loadingIndicator" aria-hidden="true">
      <div class="dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>

    <div class="input-container">
      <div class="input-area">
        <label for="userInput" class="sr-only">Type your stadium question here</label>
        <textarea 
          id="userInput" 
          placeholder="Ask NaviBot... e.g. Where is the restroom near Section B?"
          aria-label="Type your stadium question here"
          aria-required="true"
          rows="1"
          maxlength="300"
        ></textarea>
        <button id="sendBtn" aria-label="Send message to NaviBot">
          <span aria-hidden="true">➤</span> Send
        </button>
      </div>
    </div>
  </main>

  <script>
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const stadiumSelect = document.getElementById('stadiumSelect');
    const languageSelect = document.getElementById('languageSelect');

    userInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
      if(this.value.trim().length > 0) {
        sendBtn.disabled = false;
      }
    });

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    function formatText(text) {
      let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      formatted = formatted.replace(/\n\*/g, '<br>•');
      formatted = formatted.replace(/\n-/g, '<br>•');
      formatted = formatted.replace(/\n/g, '<br>');
      return formatted;
    }

    function appendMessage(sender, text, meta = null) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;
      
      const textP = document.createElement('p');
      textP.innerHTML = formatText(text);
      msgDiv.appendChild(textP);

      if (meta && sender === 'bot') {
        const metaDiv = document.createElement('div');
        metaDiv.className = 'meta-data';
        
        if (meta.intent && meta.intent !== 'general_navigation') {
           metaDiv.innerHTML += `<span>📍 Intent: ${meta.intent.replace('_', ' ')}</span>`;
        }
        
        if (meta.section) {
           metaDiv.innerHTML += `<span>🎫 Sec: ${meta.section}</span>`;
        }
        
        if (meta.crowd_category) {
           metaDiv.innerHTML += `<span class="badge crowd-${meta.crowd_category}">Crowd: ${meta.crowd_category}</span>`;
        }
        
        if (meta.cached) {
           metaDiv.innerHTML += `<span>⚡ Cached</span>`;
        }
        
        if(metaDiv.innerHTML !== '') {
            msgDiv.appendChild(metaDiv);
        }
      }

      chatContainer.appendChild(msgDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      if(text.length > 300) {
          appendMessage('bot', "⚠️ Error: Your request is too long. Please keep it under 300 characters for stadium assistance.");
          return;
      }

      appendMessage('user', text);
      userInput.value = '';
      userInput.style.height = 'auto';
      sendBtn.disabled = true;

      loadingIndicator.style.display = 'block';
      chatContainer.appendChild(loadingIndicator);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      try {
        const response = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query: text,
            stadium: stadiumSelect.value,
            language: languageSelect.value
          })
        });

        const data = await response.json();
        
        loadingIndicator.style.display = 'none';
        
        if (!response.ok) {
           appendMessage('bot', `⚠️ Error: ${data.detail || 'Could not connect to NaviBot.'}`);
        } else {
           appendMessage('bot', data.response, data);
        }
      } catch (error) {
        loadingIndicator.style.display = 'none';
        appendMessage('bot', "🔌 Network Error: Unable to reach stadium servers. Please try again.");
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }
  </script>
</body>
</html>
